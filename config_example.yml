# Battery Control System - Configuration File
# Copy this file to config.yml and fill in your values.

# Battery capacity in kWh
battery_capacity_kwh: 20.0

# Hard reserve: never discharge below this SoC (percentage)
# Summer: less conservative (more solar available to refill)
# Winter: more conservative (limited solar)
hard_reserve_pct:
  summer: 10
  winter: 20

# Price floor anchors for piecewise linear interpolation when price > cutoff
# Floor is linearly interpolated between anchors; clamped outside range
# Lower floor = more aggressive discharge at that price level
price_floor_anchors:
  summer:
    - { price_cents: 8,  soc_floor_pct: 50 }
    - { price_cents: 10, soc_floor_pct: 30 }
    - { price_cents: 20, soc_floor_pct: 20 }
    - { price_cents: 30, soc_floor_pct: 10 }
  winter:
    - { price_cents: 8,  soc_floor_pct: 60 }
    - { price_cents: 10, soc_floor_pct: 45 }
    - { price_cents: 20, soc_floor_pct: 30 }
    - { price_cents: 30, soc_floor_pct: 20 }

# Headroom band for near-full battery during solar surplus
# If SoC >= headroom_band_high, allow limited discharge to create room
headroom_band_low: 85
headroom_band_high: 95

# Command buffer: minimum SoC change (%) to trigger EP Cube update
reserve_soc_buffer_pct: 2

# Command buffer: optional periodic resend interval (0 = disabled)
epcube_resend_interval_minutes: 0

# Time-period reserve adjustment on top of price floor (above cutoff only)
# Evening: +time_adjust_soc_pct (preserve more battery for later expensive load)
# Morning: -time_adjust_soc_pct (allow more battery use, solar is likely coming)
time_adjust_soc_pct: 5
evening_adjust_start_hour: 13
evening_adjust_end_hour: 23
morning_adjust_start_hour: 2
morning_adjust_end_hour: 10

# --- Cutoff Adjustment ---
# SoC-based wrapper around comedlib cutoff price.
# High SoC lowers the cutoff (more willing to discharge).
# Low SoC raises the cutoff (conserve battery).
# Thresholds define where the adjustment reaches full magnitude.
cutoff_adjust_soc_high_threshold: 85
cutoff_adjust_soc_low_threshold: 25
# Adjustment magnitude in cents at each threshold
cutoff_adjust_soc_high_cents: 1.0
cutoff_adjust_soc_low_cents: 1.0
# Bounds: final adjusted cutoff is clamped to this range
cutoff_adjust_min_cents: 2.0
cutoff_adjust_max_cents: 12.0

# Season: 'auto' (May-Sep=summer), 'summer', or 'winter'
season: auto

# --- EP Cube Configuration ---
# Path to YAML file with EP Cube credentials for auto-renewal
# Create with: source source_me.sh && python3 epcube_setup.py
# Contains: epcube_region, epcube_device_sn, epcube_username, epcube_password
epcube_auth_file: "~/.config/battcontrol/epcube_auth.yml"

# Path to file containing EP Cube authorization token
# Auto-generated from auth file, or manual: python3 epcube_get_token.py -e your@email.com
epcube_token_file: "~/.epcube_token"

# EP Cube cloud region: US, EU, or JP (overridden by auth file if present)
epcube_region: "US"

# EP Cube device serial number (overridden by auth file if present)
epcube_device_sn: ""

# --- WeMo Configuration ---
# Names of WeMo smart plugs controlling the second battery
# Leave empty if not using WeMo plugs
wemo_charge_plug_name: ""
wemo_discharge_plug_name: ""

# --- State Persistence ---
# Path to JSON file for tracking command buffer state
state_file_path: "/tmp/battery_control_state.json"

# --- Safety ---
# Start in dry-run mode (log only, no commands sent)
# Override with --execute on command line
dry_run: true

# Token age warning: log a warning if token is older than this (hours)
token_warning_age_hours: 168  # 7 days
